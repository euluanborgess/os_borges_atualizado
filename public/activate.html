<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borges OS - Ativar Conta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0a0a0f] text-gray-300 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-[#111118] border border-[#1e1e2e] rounded-3xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-white mb-2 tracking-tighter">Borges OS</h1>
            <p class="text-gray-500 text-sm">Defina sua senha para começar</p>
        </div>

        <form id="activation-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2 ml-1">E-mail</label>
                <input type="email" id="email" readonly class="w-full bg-[#0a0a0f] border border-[#1e1e2e] rounded-xl px-4 py-3 text-sm text-gray-500 cursor-not-allowed" />
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2 ml-1">Nome Completo</label>
                <input type="text" id="fullname" required class="w-full bg-[#0a0a0f] border border-[#1e1e2e] rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500/50" />
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2 ml-1">Nova Senha</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full bg-[#0a0a0f] border border-[#1e1e2e] rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500/50" />
            </div>
            <button type="submit" class="w-full py-4 rounded-xl bg-gradient-to-r from-cyan-600 to-cyan-500 text-[#0a0a0f] font-black text-sm shadow-xl shadow-cyan-500/20 hover:scale-[1.02] transition-all mt-4">
                ATIVAR E ACESSAR DASHBOARD
            </button>
        </form>
    </div>

    <script>
        // Lógica simples de captura de params da URL
        const params = new URLSearchParams(window.location.search);
        document.getElementById('email').value = params.get('email') || "";
        
        document.getElementById('activation-form').onsubmit = (e) => {
            e.preventDefault();
            alert("Conta ativada com sucesso! Redirecionando...");
            window.location.href = '/login.html';
        };
    </script>
</body>
</html>
