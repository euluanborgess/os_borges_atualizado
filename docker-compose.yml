version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: borges
      POSTGRES_PASSWORD: borgespassword
      POSTGRES_DB: borges_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  evolution_api:
    image: evoapicloud/evolution-api:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://host.docker.internal:8080
      - DOCKER_ENV=true
      - LOG_LEVEL=CLIENT,ERROR,INFO
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://borges:borgespassword@db:5432/borges_os?schema=evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - AUTHENTICATION_API_KEY=global-api-key-evolution
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis

  api:
    build: .
    # Load local overrides from .env (do NOT commit secrets)
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://borges:borgespassword@db:5432/borges_os
      - REDIS_URL=redis://redis:6379/0
      # Optional defaults (override per tenant in UI)
      - EVOLUTION_API_URL=http://evolution_api:8080
      - EVOLUTION_API_KEY=global-api-key-evolution
      - LLM_MODEL=gpt-4.1-mini
      # Secrets + public URL
      - OPENAI_API_KEY=${OPENAI_API_KEY-}
      - SECRET_KEY=${SECRET_KEY-changeit}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL-http://localhost:8000}
      # First-run bootstrap
      - SEED_ADMIN_ON_STARTUP=${SEED_ADMIN_ON_STARTUP-false}
      - DEFAULT_TENANT_NAME=${DEFAULT_TENANT_NAME-}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL-}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD-}
      - DEFAULT_ADMIN_FULL_NAME=${DEFAULT_ADMIN_FULL_NAME-}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - evolution_api

volumes:
  postgres_data:
