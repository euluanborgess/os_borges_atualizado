<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Borges OS Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050508;
            /* Mais escuro que o background nativo do app */
            color: #d1d1e0;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Ambient glowing effects */
        .glow-orb-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            animation: float 15s ease-in-out infinite alternate;
        }

        .glow-orb-2 {
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(14, 116, 144, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            animation: float 20s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(5%, 5%);
            }
        }

        .login-glass {
            background: rgba(17, 17, 24, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        input {
            background: rgba(10, 10, 15, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            color: white !important;
        }

        input:focus {
            border-color: rgba(6, 182, 212, 0.5) !important;
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.1) !important;
            outline: none;
        }
    </style>
</head>

<body>
    <div class="glow-orb-1"></div>
    <div class="glow-orb-2"></div>

    <div class="login-glass w-full max-w-md p-10 rounded-3xl relative z-10 mx-4">

        <div class="flex justify-center mb-8">
            <div class="w-16 h-16 rounded-2xl flex items-center justify-center relative overflow-hidden group border border-[#1e1e2e]"
                style="background: linear-gradient(135deg, #0d1117 0%, #111118 100%);">
                <div
                    class="absolute inset-0 bg-gradient-to-br from-cyan-500/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                </div>
                <i
                    class="fa-solid fa-layer-group text-3xl font-black bg-clip-text text-transparent bg-gradient-to-br from-cyan-400 to-cyan-600"></i>
            </div>
        </div>

        <div class="text-center mb-10">
            <h1 class="text-2xl font-bold text-white tracking-tight mb-2">Borges OS</h1>
            <p class="text-sm text-[#8b8b9e]">Acesse seu Workspace Enterprise</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div id="error-alert"
                class="hidden bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 rounded-xl text-sm mb-4 flex items-center gap-3">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="error-message">Credenciais inválidas.</span>
            </div>

            <div>
                <label class="block text-xs font-semibold text-[#8b8b9e] tracking-wider uppercase mb-2 ml-1">E-mail
                    Corporativo</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-envelope text-[#5a5a6e]"></i>
                    </div>
                    <input type="email" id="email" required placeholder="admin@borges.com"
                        class="w-full pl-11 pr-4 py-3.5 rounded-xl text-sm transition-all focus:bg-[#0a0a0f]"
                        autocomplete="email">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-2 ml-1">
                    <label class="block text-xs font-semibold text-[#8b8b9e] tracking-wider uppercase">Senha</label>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-[#5a5a6e]"></i>
                    </div>
                    <input type="password" id="password" required placeholder="••••••••"
                        class="w-full pl-11 pr-4 py-3.5 rounded-xl text-sm transition-all focus:bg-[#0a0a0f]"
                        autocomplete="current-password">
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-3.5 rounded-xl text-white font-semibold flex items-center justify-center gap-2 mt-8 transition-all hover:opacity-90 hover:shadow-[0_0_20px_rgba(6,182,212,0.3)]"
                style="background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%)">
                <span id="btnText">Entrar no Workspace</span>
                <i id="btnIcon" class="fa-solid fa-arrow-right text-sm"></i>
                <i id="btnSpinner" class="fa-solid fa-circle-notch fa-spin hidden"></i>
            </button>
        </form>

        <p class="text-center text-xs text-[#5a5a6e] mt-10">
            &copy; 2026 Borges OS SaaS Platform. Todos os direitos reservados.
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('error-alert');
            const errorMessage = document.getElementById('error-message');

            // Set Loading state
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const btnSpinner = document.getElementById('btnSpinner');
            const submitBtn = document.getElementById('submitBtn');

            btnText.textContent = "Autenticando...";
            btnIcon.classList.add('hidden');
            btnSpinner.classList.remove('hidden');
            submitBtn.disabled = true;
            errorAlert.classList.add('hidden');

            try {
                const formData = new URLSearchParams();
                formData.append('username', email); // Formato OAuth2 pede 'username'
                formData.append('password', password);

                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Falha ao autenticar.');
                }

                // Salva os dados sensíveis no Browser do Usuário (LocalStorage)
                localStorage.setItem('borges_token', data.access_token);
                localStorage.setItem('borges_user', JSON.stringify(data.user));

                // Redireciona para o Painel Principal SPA
                window.location.href = '/';

            } catch (error) {
                errorMessage.textContent = error.message;
                errorAlert.classList.remove('hidden');
            } finally {
                // Reset loading state
                btnText.textContent = "Entrar no Workspace";
                btnIcon.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
